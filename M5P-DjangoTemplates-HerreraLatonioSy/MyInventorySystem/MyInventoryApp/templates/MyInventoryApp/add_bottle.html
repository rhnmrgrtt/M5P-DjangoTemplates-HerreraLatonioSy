{% extends 'MyInventoryApp/base.html' %}

{% block content %}
<h2>Add Water Bottle</h2>
    <form method="post">
        {% csrf_token %}
        <label>Name: <input type="text" name="name"></label><br>
        <label>Capacity: <input type="text" name="capacity"></label><br>
        <label>Price: <input type="text" name="price"></label><br>
        <label>Supplier: <input type="text" name="supplier"></label><br>
        <button type="submit">Add Bottle</button>
    </form>
{% endblock %}
